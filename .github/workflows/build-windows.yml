name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow

      - name: Download icon (fallback if missing)
        shell: pwsh
        run: |
          if (-not (Test-Path "assets/icon.ico")) {
            New-Item -ItemType Directory -Force assets | Out-Null
            Invoke-WebRequest -Uri "https://www.iconarchive.com/download/i107261/paomedia/small-n-flat/video.ico" `
              -OutFile "assets/icon.ico" -ErrorAction SilentlyContinue
          }

      - name: Build installer exe
        shell: pwsh
        run: |
          # Generate embedded payload module
          python build_payload.py

          # Run PyInstaller on Windows — produces a real Windows PE exe
          pyinstaller `
            --onefile `
            --noconsole `
            --name "ReactionStudio-Setup" `
            --icon "assets/icon.ico" `
            --add-data "_rs_payload.py;." `
            --hidden-import "_rs_payload" `
            --hidden-import "winreg" `
            installer_main.py

      - name: Verify output
        shell: pwsh
        run: |
          $exe = "dist/ReactionStudio-Setup.exe"
          if (Test-Path $exe) {
            $size = (Get-Item $exe).Length / 1MB
            Write-Host "Built: $exe ($([math]::Round($size,1)) MB)"
          } else {
            Write-Error "Build failed — exe not found"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReactionStudio-Setup-exe
          path: dist/ReactionStudio-Setup.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ReactionStudio-Setup.exe
          name: "Reaction Studio ${{ github.ref_name }}"
          body: |
            ## Reaction Studio ${{ github.ref_name }}

            ### One-click Windows Installer
            Download **ReactionStudio-Setup.exe** and double-click it. No unzipping, no right-click — just run.

            **What it installs:**
            - Reaction Studio app (to AppData\ReactionStudio)
            - Desktop shortcut
            - Start Menu entry
            - All Python packages (yt-dlp, moviepy, piper-tts, whisper, etc.)

            **Prerequisites (free, one-time):**
            - [Python 3.10+](https://python.org/downloads)
            - [Ollama](https://ollama.com) → then run: `ollama pull llama3`
            - [ffmpeg](https://ffmpeg.org/download.html)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
